name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 26
          cache: 'npm'
      - run: npm ci
      - run: npm run cf-typegen
      - run: npm run build
        env:
          PUBLIC_R2_STATIC: ${{ vars.PUBLIC_R2_STATIC }}
      - run: npm run lint
